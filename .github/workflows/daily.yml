name: Daily MLB HR Model

on:
  schedule:
    - cron: '0 16 * * *'   # Early window: 12pm ET (16:00 UTC / EDT)
    - cron: '0 19 * * *'   # Mid window:   3pm ET  (19:00 UTC / EDT) — runs before 4pm games start
    - cron: '0 23 * * *'   # Late window:  7pm ET  (23:00 UTC / EDT)

  workflow_dispatch:
    inputs:
      date:
        description: 'Date to run (YYYY-MM-DD, leave blank for today)'
        required: false
        default: ''
      window:
        description: 'Window to run: early | mid | late (leave blank for all)'
        required: false
        default: ''

jobs:

  early-window:
    name: Early window (12–3:59 pm ET)
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '0 16 * * *') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.window == 'early' || github.event.inputs.window == ''))
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Set run date
        run: |
          D="${{ github.event.inputs.date }}"
          echo "RUN_DATE=${D:-$(date +%Y-%m-%d)}" >> $GITHUB_ENV

      - name: Fetch existing daily report
        run: |
          git fetch origin gh-pages --depth=1 2>/dev/null || true
          mkdir -p docs
          git show origin/gh-pages:report_${RUN_DATE}.html > "docs/report_${RUN_DATE}.html" 2>/dev/null || true

      - name: Run model
        env:
          ODDS_API_KEY:        ${{ secrets.ODDS_API_KEY }}
          GMAIL_ADDRESS:       ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_EMAIL:        ${{ secrets.REPORT_EMAIL }}
          REPORT_PHONE:        ${{ secrets.REPORT_PHONE }}
          CARRIER:             ${{ secrets.CARRIER }}
          PAGES_URL:           ${{ secrets.PAGES_URL }}
        run: python mlb_hr_model.py -k "$ODDS_API_KEY" -d "$RUN_DATE" --window early

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: hashFiles('docs/index.html') != ''
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true

  mid-window:
    name: Mid window (4–6:59 pm ET)
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '0 19 * * *') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.window == 'mid' || github.event.inputs.window == ''))
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Set run date
        run: |
          D="${{ github.event.inputs.date }}"
          echo "RUN_DATE=${D:-$(date +%Y-%m-%d)}" >> $GITHUB_ENV

      - name: Fetch existing daily report
        run: |
          git fetch origin gh-pages --depth=1 2>/dev/null || true
          mkdir -p docs
          git show origin/gh-pages:report_${RUN_DATE}.html > "docs/report_${RUN_DATE}.html" 2>/dev/null || true

      - name: Run model
        env:
          ODDS_API_KEY:        ${{ secrets.ODDS_API_KEY }}
          GMAIL_ADDRESS:       ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_EMAIL:        ${{ secrets.REPORT_EMAIL }}
          REPORT_PHONE:        ${{ secrets.REPORT_PHONE }}
          CARRIER:             ${{ secrets.CARRIER }}
          PAGES_URL:           ${{ secrets.PAGES_URL }}
        run: python mlb_hr_model.py -k "$ODDS_API_KEY" -d "$RUN_DATE" --window mid

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: hashFiles('docs/index.html') != ''
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true

  late-window:
    name: Late window (7 pm+ ET)
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '0 23 * * *') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.window == 'late' || github.event.inputs.window == ''))
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Set run date
        run: |
          D="${{ github.event.inputs.date }}"
          echo "RUN_DATE=${D:-$(date +%Y-%m-%d)}" >> $GITHUB_ENV

      - name: Fetch existing daily report
        run: |
          git fetch origin gh-pages --depth=1 2>/dev/null || true
          mkdir -p docs
          git show origin/gh-pages:report_${RUN_DATE}.html > "docs/report_${RUN_DATE}.html" 2>/dev/null || true

      - name: Run model
        env:
          ODDS_API_KEY:        ${{ secrets.ODDS_API_KEY }}
          GMAIL_ADDRESS:       ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_EMAIL:        ${{ secrets.REPORT_EMAIL }}
          REPORT_PHONE:        ${{ secrets.REPORT_PHONE }}
          CARRIER:             ${{ secrets.CARRIER }}
          PAGES_URL:           ${{ secrets.PAGES_URL }}
        run: python mlb_hr_model.py -k "$ODDS_API_KEY" -d "$RUN_DATE" --window late

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: hashFiles('docs/index.html') != ''
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true
