name: Daily MLB HR Model

on:
  schedule:
    - cron: '30 15 * * *'   # Early window:  11:30am ET (15:30 UTC)
    - cron: '45 21 * * *'   # Mid window:     5:45pm ET (21:45 UTC)
    - cron: '45 0 * * *'    # Late window:    8:45pm ET (00:45 UTC next day)
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:

  build:
    name: Run model
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - run: pip install requests pybaseball pandas

      - name: Run model
        env:
          ODDS_API_KEY:       ${{ secrets.ODDS_API_KEY }}
          GMAIL_ADDRESS:      ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_EMAIL:       ${{ secrets.REPORT_EMAIL }}
          REPORT_PHONE:       ${{ secrets.REPORT_PHONE }}
          CARRIER:            ${{ secrets.CARRIER }}
        run: |
          python mlb_hr_model.py \
            -k "$ODDS_API_KEY" \
            --pages-url https://mattharding23.github.io/mlb-hr-model/ || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
