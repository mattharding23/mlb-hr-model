name: Daily MLB HR Model

on:
  schedule:
    # All times EDT (UTC-4). Shifts 1 hour later in Nov when clocks fall back.
    - cron: '30 15 * * *'   # 11:30 AM EDT → early window
    - cron: '0 20 * * *'    # 4:00 PM EDT  → mid window
    - cron: '0 23 * * *'    # 7:00 PM EDT  → late window

  # "Run workflow" button in the GitHub Actions tab — useful for testing
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to run (YYYY-MM-DD, leave blank for today)'
        required: false
        default: ''

jobs:
  run-model:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Get the code ─────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Python + dependency cache ────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 3. Run the model ────────────────────────────────────────
      - name: Run model
        env:
          ODDS_API_KEY:        ${{ secrets.ODDS_API_KEY }}
          GMAIL_ADDRESS:       ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_EMAIL:        ${{ secrets.REPORT_EMAIL }}
          REPORT_PHONE:        ${{ secrets.REPORT_PHONE }}
          CARRIER:             ${{ secrets.CARRIER }}
          PAGES_URL:           ${{ secrets.PAGES_URL }}
        run: |
          # Use workflow_dispatch date input if provided, otherwise today
          RUN_DATE="${{ github.event.inputs.date }}"
          if [ -z "$RUN_DATE" ]; then
            RUN_DATE=$(date +%Y-%m-%d)
          fi

          # Derive window from current UTC hour (EDT = UTC-4)
          UTC_HOUR=$(date +%H | sed 's/^0//')
          EDT_HOUR=$(( (UTC_HOUR - 4 + 24) % 24 ))
          if   [ "$EDT_HOUR" -lt 16 ]; then WINDOW="early"
          elif [ "$EDT_HOUR" -lt 19 ]; then WINDOW="mid"
          else                              WINDOW="late"
          fi

          echo "Running model for $RUN_DATE  window=$WINDOW"
          python mlb_hr_model.py -k "$ODDS_API_KEY" -d "$RUN_DATE" --window "$WINDOW"

      # ── 4. Deploy report to GitHub Pages ────────────────────────
      #    The Python script already writes docs/index.html
      #    This step publishes it to your-username.github.io/mlb-hr-model
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        # Only deploy if docs/index.html was actually written (i.e., there were games)
        if: hashFiles('docs/index.html') != ''
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          # Keep previous reports accessible at /reports/report_YYYY-MM-DD.html
          keep_files: false
